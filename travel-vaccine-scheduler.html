<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>海外渡航ワクチンスケジューラー</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
      background: #f0f4f8;
      color: #333;
    }

    .app-header {
      background: linear-gradient(135deg, #1a6b3a, #0d4a28);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .app-header h1 { font-size: 1.2rem; flex: 1; }

    .app-body {
      display: flex;
      align-items: flex-start;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 250px;
      flex-shrink: 0;
      background: white;
      border-right: 1px solid #dce3ea;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 52px;
      height: calc(100vh - 52px);
      overflow-y: auto;
    }
    .sidebar-top {
      padding: 12px;
      border-bottom: 1px solid #eee;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .btn-add {
      background: #1a6b3a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 0.88rem;
      cursor: pointer;
      width: 100%;
    }
    .btn-add:hover { background: #0d4a28; }
    .search-box {
      border: 1px solid #ccc;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 0.84rem;
      width: 100%;
      outline: none;
    }
    .search-box:focus { border-color: #1a6b3a; }
    .patient-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .patient-card {
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      border: 1px solid #e8edf2;
      background: #fafcfd;
    }
    .patient-card:hover { background: #eef8f2; border-color: #8ec9a7; }
    .patient-card.selected { background: #d8f0e3; border-color: #1a6b3a; }
    .pc-name { font-weight: 600; font-size: 0.9rem; }
    .pc-meta { font-size: 0.75rem; color: #666; margin-top: 2px; }
    .pc-progress { margin-top: 4px; font-size: 0.72rem; color: #1a6b3a; font-weight: 600; }
    .empty-list { text-align: center; color: #aaa; font-size: 0.84rem; padding: 24px 8px; }

    /* ── Main ── */
    .main-panel {
      flex: 1;
      min-width: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .patient-header-card {
      background: white;
      border-radius: 10px;
      padding: 16px 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .ph-name { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; }
    .ph-meta { font-size: 0.84rem; color: #555; display: flex; gap: 12px; flex-wrap: wrap; }
    .ph-actions { display: flex; gap: 8px; flex-shrink: 0; }

    .section-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    .section-header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid #eee;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .section-header:hover { background: #f5faf7; }
    .section-header h2 { font-size: 1rem; color: #1a6b3a; flex: 1; }
    .section-toggle { font-size: 0.85rem; color: #888; transition: transform 0.2s; flex-shrink: 0; }
    .section-toggle.collapsed { transform: rotate(-90deg); }
    .section-body { transition: none; }
    .section-body.collapsed { display: none; }

    /* ── Vaccine selector ── */
    .vaccine-selector {
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .date-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .date-row label { font-size: 0.85rem; color: #555; white-space: nowrap; }
    .date-row input[type="date"] {
      border: 1px solid #ccc;
      border-radius: 7px;
      padding: 7px 10px;
      font-size: 0.9rem;
      outline: none;
    }
    .date-row input:focus { border-color: #1a6b3a; }

    .vaccine-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 8px;
    }
    .vax-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border: 1px solid #e0e8f0;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.1s, border-color 0.1s;
      background: white;
    }
    .vax-item:hover { background: #eef8f2; border-color: #8ec9a7; }
    .vax-item.selected { background: #d8f0e3; border-color: #1a6b3a; }
    .vax-item input[type="checkbox"] { width: 16px; height: 16px; flex-shrink: 0; margin-top: 2px; cursor: pointer; }
    .vax-item-text {}
    .vax-item-name { font-size: 0.88rem; font-weight: 600; }
    .vax-item-detail { font-size: 0.72rem; color: #666; margin-top: 1px; }
    .vax-category {
      font-size: 0.75rem;
      font-weight: 700;
      color: #1a6b3a;
      background: #eef8f2;
      padding: 5px 10px;
      border-radius: 6px;
      margin-top: 4px;
      letter-spacing: 0.03em;
    }

    .btn-generate {
      background: #1a6b3a;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 0.92rem;
      cursor: pointer;
      align-self: flex-start;
    }
    .btn-generate:hover { background: #0d4a28; }

    /* ── Schedule table ── */
    .schedule-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
    }
    .schedule-table th {
      background: #1a6b3a;
      color: white;
      padding: 10px 12px;
      text-align: left;
      font-weight: 600;
    }
    .schedule-table td {
      padding: 9px 12px;
      border-bottom: 1px solid #eef;
      vertical-align: middle;
    }
    .schedule-table tr:last-child td { border-bottom: none; }
    .schedule-table tr:hover td { background: #f5faf7; }
    .date-group-header td {
      background: #f0f7f3 !important;
      font-weight: 700;
      font-size: 0.82rem;
      color: #1a6b3a;
      padding: 6px 12px;
      border-top: 2px solid #c5e0cf;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.71rem;
      font-weight: bold;
      white-space: nowrap;
    }
    .badge-required  { background: #fde8e8; color: #c0392b; }
    .badge-optional  { background: #fff3cd; color: #856404; }
    .badge-mandatory { background: #d4edda; color: #155724; }

    .done-check {
      width: 18px; height: 18px; cursor: pointer;
    }
    .row-done td { opacity: 0.5; text-decoration: line-through; }

    .empty-main {
      text-align: center;
      color: #aaa;
      padding: 60px 20px;
      font-size: 0.95rem;
    }

    /* ── Modal ── */
    .modal-bg {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-card {
      background: white;
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 480px;
      width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-card h3 { font-size: 1.05rem; margin-bottom: 18px; color: #0d4a28; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 4px; }
    .form-group input[type="text"],
    .form-group input[type="date"],
    .form-group select,
    .form-group textarea {
      width: 100%;
      border: 1px solid #ccc;
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 0.9rem;
      outline: none;
      font-family: inherit;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { border-color: #1a6b3a; }
    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 20px;
    }
    .btn-cancel {
      background: #f0f4f8; color: #555; border: 1px solid #ccc;
      border-radius: 7px; padding: 8px 18px; font-size: 0.88rem; cursor: pointer;
    }
    .btn-cancel:hover { background: #e4e9ef; }
    .btn-primary {
      background: #1a6b3a; color: white; border: none;
      border-radius: 7px; padding: 8px 20px; font-size: 0.88rem; cursor: pointer;
    }
    .btn-primary:hover { background: #0d4a28; }
    .btn-danger {
      background: #c0392b; color: white; border: none;
      border-radius: 7px; padding: 8px 18px; font-size: 0.88rem; cursor: pointer;
    }
    .btn-danger:hover { background: #922b21; }
    .btn-sm {
      background: #f0f4f8; color: #1a6b3a; border: 1px solid #a5d6b7;
      border-radius: 6px; padding: 5px 12px; font-size: 0.8rem; cursor: pointer;
    }
    .btn-sm:hover { background: #daf0e4; }
    .btn-sm-danger {
      background: #fff0f0; color: #c0392b; border: 1px solid #f5c6c6;
      border-radius: 6px; padding: 5px 10px; font-size: 0.8rem; cursor: pointer;
    }
    .btn-sm-danger:hover { background: #ffe0e0; }

    .print-hint {
      font-size: 0.78rem;
      color: #888;
      margin-left: 8px;
    }

    /* ── Vaccine lookup panel ── */
    .lookup-card { background: white; border-radius: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); overflow: hidden; }
    .lookup-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 12px; }
    .lookup-dest-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .lookup-dest-row span { font-size: 0.9rem; font-weight: 600; color: #1a6b3a; }
    .btn-lookup {
      background: #1a6b3a; color: white; border: none;
      border-radius: 7px; padding: 8px 18px; font-size: 0.86rem; cursor: pointer;
    }
    .btn-lookup:hover { background: #0d4a28; }
    .btn-lookup:disabled { background: #aaa; cursor: not-allowed; }
    .lookup-links { display: flex; gap: 10px; flex-wrap: wrap; }
    .lookup-link {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 5px 12px; border-radius: 6px; font-size: 0.82rem;
      text-decoration: none; font-weight: 600;
    }
    .lookup-link-cdc  { background: #e8f0fe; color: #1a56db; border: 1px solid #b3c7f9; }
    .lookup-link-forth { background: #e8f5e9; color: #1a6b3a; border: 1px solid #a5d6a7; }
    .lookup-link:hover { opacity: 0.8; }
    .lookup-results { display: flex; flex-direction: column; gap: 16px; }
    .lookup-source { width: 100%; }
    .lookup-source-title {
      font-size: 0.85rem; font-weight: 700; color: #333; margin-bottom: 8px;
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .lookup-source-title a { font-size: 0.75rem; font-weight: normal; }
    .lookup-source-bar { display: flex; gap: 16px; padding: 8px 0 4px; font-size: 0.82rem; color: #555; flex-wrap: wrap; }
    .lookup-source-bar a { color: #1a56db; text-decoration: none; }
    .lookup-source-bar a:hover { text-decoration: underline; }
    .gt-link { margin-left: 6px; background: #f0f4ff; border: 1px solid #c7d2fe; border-radius: 4px; padding: 1px 6px; font-size: 0.75rem; color: #3730a3 !important; white-space: nowrap; }
    .forth-badge { display: inline-block; font-size: 0.68rem; background: #e8f5e9; color: #1a6b3a; border: 1px solid #a5d6a7; border-radius: 4px; padding: 1px 5px; vertical-align: middle; margin-left: 4px; white-space: nowrap; }
    .forth-note { color: #1a6b3a !important; border-left: 2px solid #a5d6a7; padding-left: 5px; margin-top: 2px; }
    .note-expand-btn { background: none; border: none; color: #1a6b3a; font-size: 0.7rem; cursor: pointer; padding: 0 3px; text-decoration: underline; vertical-align: baseline; }
    .note-expand-btn:hover { color: #0d4a26; }
    .sidebar-ref-links { padding: 10px 12px; border-top: 1px solid #dce3ea; font-size: 0.75rem; display: flex; flex-direction: column; gap: 4px; }
    .sidebar-ref-title { color: #888; font-weight: 600; margin-bottom: 2px; }
    .sidebar-ref-links a { color: #1a56db; text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .sidebar-ref-links a:hover { text-decoration: underline; }
    .lookup-vax-list { display: flex; flex-direction: column; gap: 5px; }
    .lookup-vax-item {
      display: grid;
      grid-template-columns: 20px 1fr auto;
      align-items: start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 7px;
      font-size: 0.84rem;
      background: #f5faf7;
      border: 1px solid #e0ede6;
      cursor: pointer;
    }
    .lookup-vax-item:hover { opacity: 0.85; }
    .lookup-vax-item.lvl-recommended { background: #fff8e1; border-color: #ffe082; }
    .lookup-vax-item.lvl-consider    { background: #fde8e8; border-color: #f5c6c6; }
    .lookup-vax-item.lvl-routine     { background: #f0f4f8; border-color: #d0dae5; color: #666; }
    .lookup-vax-item.selected        { outline: 2px solid #1a6b3a; }
    .lookup-vax-item input[type="checkbox"] { width: 16px; height: 16px; margin-top: 2px; cursor: pointer; }
    .lookup-vax-info { display: flex; flex-direction: column; gap: 2px; }
    .lookup-vax-name { font-weight: 700; }
    .lookup-vax-note { font-size: 0.75rem; color: #666; line-height: 1.4; }
    .lookup-vax-level { font-size: 0.7rem; white-space: nowrap; color: #888; padding-top: 3px; }
    .lookup-level-header {
      font-size: 0.75rem; font-weight: 700; margin: 8px 0 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .lookup-add-all {
      background: none; border: 1px solid #1a6b3a; color: #1a6b3a;
      border-radius: 5px; font-size: 0.72rem; padding: 2px 8px; cursor: pointer; margin-left: auto;
    }
    .lookup-add-all:hover { background: #eef8f2; }
    .lookup-loading { color: #888; font-size: 0.86rem; padding: 8px 0; }
    .lookup-error { color: #c0392b; font-size: 0.84rem; padding: 8px 0; }
    .lookup-notfound { color: #888; font-size: 0.84rem; padding: 8px 0; }

    @media print {
      .app-header, .sidebar, .ph-actions, .btn-generate,
      .vaccine-selector, .modal-bg, .schedule-card-header .btn-sm { display: none !important; }
      .app-body { height: auto; }
      .main-panel { padding: 0; }
      .schedule-table td, .schedule-table th { font-size: 0.8rem; }
    }

    @media (max-width: 700px) {
      .app-body { flex-direction: column; height: auto; }
      .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid #dce3ea; }
      .patient-list { flex-direction: row; overflow-x: auto; overflow-y: hidden; flex-wrap: nowrap; padding: 8px; }
      .patient-card { min-width: 140px; flex-shrink: 0; }
      .vaccine-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ===== Add/Edit Patient Modal ===== -->
<div id="patient-modal" class="modal-bg" style="display:none">
  <div class="modal-card">
    <h3 id="modal-title">✈️ 患者を登録</h3>
    <div class="form-group">
      <label>患者ID（任意）</label>
      <input type="text" id="modal-id" placeholder="例：TV001" maxlength="30">
    </div>
    <div class="form-group">
      <label>イニシャル / 氏名 *</label>
      <input type="text" id="modal-initial" placeholder="例：T.T. または 田中 太郎" maxlength="50">
    </div>
    <div class="form-group">
      <label>渡航先（任意）</label>
      <input type="text" id="modal-dest" placeholder="例：東南アジア、インド、アフリカ" maxlength="100">
    </div>
    <div class="form-group">
      <label>渡航予定日（任意）</label>
      <input type="date" id="modal-travel-date">
    </div>
    <div class="form-group">
      <label>メモ（任意）</label>
      <textarea id="modal-notes" rows="2" placeholder="アレルギーなど" maxlength="200"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePatientModal()">キャンセル</button>
      <button class="btn-primary" onclick="savePatient()">保存</button>
    </div>
  </div>
</div>

<!-- ===== Delete Confirm Modal ===== -->
<div id="delete-modal" class="modal-bg" style="display:none">
  <div class="modal-card">
    <h3>🗑 患者を削除しますか？</h3>
    <p id="delete-name" style="font-weight:600;margin-bottom:8px"></p>
    <p style="font-size:0.85rem;color:#666">この操作は取り消せません。</p>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('delete-modal').style.display='none'">キャンセル</button>
      <button class="btn-danger" onclick="executeDelete()">削除する</button>
    </div>
  </div>
</div>

<!-- ===== App ===== -->
<header class="app-header">
  <h1>✈️ 海外渡航ワクチンスケジューラー</h1>
  <span style="font-size:0.8rem;opacity:0.8">データはこのブラウザにのみ保存</span>
</header>

<div class="app-body">
  <aside class="sidebar">
    <div class="sidebar-top">
      <button class="btn-add" onclick="openAddModal()">＋ 患者を追加</button>
      <input type="text" class="search-box" id="search-box" placeholder="ID・名前で検索..." oninput="renderList()">
    </div>
    <div class="patient-list" id="patient-list">
      <div class="empty-list">患者が登録されていません</div>
    </div>
    <div class="sidebar-ref-links">
      <div class="sidebar-ref-title">📚 参照サイト</div>
      <a href="https://www.vaccine4all.jp/" target="_blank">Vaccine4all</a>
      <a href="https://plaza.umin.ac.jp/jstah/02travelclinics/index.html" target="_blank">トラベルクリニック学会</a>
      <a href="http://jstm.gr.jp/vaccination-summary/" target="_blank">渡航医学会（ワクチン）</a>
    </div>
  </aside>

  <main class="main-panel" id="main-panel">
    <div class="empty-main">← 患者を選択するか、新規追加してください</div>
  </main>
</div>

<script>
// =============================================
// ワクチンデータ（海外渡航向け）
// =============================================
const VACCINE_CATEGORIES = [
  {
    category: '必須・推奨（渡航先によっては入国条件）',
    vaccines: [
      {
        id: 'yellowfever',
        name: '黄熱',
        badge: 'mandatory',
        badgeLabel: '証明書必須',
        doses: [
          { num: 1, label: '①', dayOffset: 0, note: '1回接種。証明書は接種後10日目から有効・生涯有効' }
        ],
        note: 'アフリカ・中南米の流行地への渡航・経由で要求される場合あり'
      },
      {
        id: 'hepa',
        name: 'A型肝炎',
        badge: 'required',
        badgeLabel: '強く推奨',
        doses: [
          { num: 1, label: '①', dayOffset: 0,   note: '初回' },
          { num: 2, label: '②', dayOffset: 28,  note: '①から2〜4週後' },
          { num: 3, label: '③', dayOffset: 180, note: '①から24週（6か月）後（長期免疫）' }
        ],
        note: '発展途上国全般に推奨。1回でも短期効果あり。16,390円（2026/06/15）'
      },
      {
        id: 'hepb',
        name: 'B型肝炎',
        badge: 'required',
        badgeLabel: '強く推奨',
        doses: [
          { num: 1, label: '①', dayOffset: 0,  note: '初回' },
          { num: 2, label: '②', dayOffset: 30, note: '①から1か月後' },
          { num: 3, label: '③', dayOffset: 140, note: '①から20週（約5か月）後' }
        ],
        altSchedules: [
          { label: '加速（0・7・21日）', offsets: [0, 7, 21], boosterDays: 365 }
        ],
        note: '長期滞在・医療行為・性的接触リスクがある場合に推奨。8,800円（2026/06/15）'
      },
      {
        id: 'typhoid',
        name: '腸チフス',
        badge: 'required',
        badgeLabel: '強く推奨',
        doses: [
          { num: 1, label: '①', dayOffset: 0, note: '注射剤：1回（3年間有効）' }
        ],
        note: '南アジア・東南アジア・アフリカ・中南米への渡航に推奨'
      },
    ]

let patients = JSON.parse(localStorage.getItem('travelVaxPatients') || '{}');
let currentId = null;
let editingId = null;
let deletingId = null;

function save() {
  localStorage.setItem('travelVaxPatients', JSON.stringify(patients));
}

// =============================================
// Util
// =============================================
function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function addDays(date, days) {
  const d = new Date(date);
  d.setDate(d.getDate() + days);
  return d;
}

function toInputDate(d) {
  if (!d) return '';
  const dt = typeof d === 'string' ? new Date(d) : d;
  if (isNaN(dt)) return '';
  return dt.toISOString().slice(0, 10);
}

function formatDate(d) {
  if (!d) return '—';
  const dt = typeof d === 'string' ? new Date(d) : d;
  if (isNaN(dt)) return '—';
  return `${dt.getFullYear()}/${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;
}

function formatDateJp(str) {
  if (!str) return '';
  const [y, m, d] = str.split('-');
  return `${y}年${parseInt(m)}月${parseInt(d)}日`;
}

function daysUntilTravel(p) {
  if (!p.travelDate) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const td = new Date(p.travelDate); td.setHours(0,0,0,0);
  return Math.round((td - today) / 86400000);
}

function openAddModal() {
  editingId = null;
  document.getElementById('modal-title').textContent = '✈️ 患者を登録';
  document.getElementById('modal-id').value = '';
  document.getElementById('modal-initial').value = '';
  document.getElementById('modal-dest').value = '';
  document.getElementById('modal-travel-date').value = '';
  document.getElementById('modal-notes').value = '';
  document.getElementById('patient-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-id').focus(), 80);
}

function openEditModal() {
  if (!currentId) return;
  const p = patients[currentId];
  editingId = currentId;
  document.getElementById('modal-title').textContent = '✎ 患者情報を編集';
  document.getElementById('modal-id').value = p.patientId || '';
  document.getElementById('modal-initial').value = p.name;
  document.getElementById('modal-dest').value = p.destination || '';
  document.getElementById('modal-travel-date').value = p.travelDate || '';
  document.getElementById('modal-notes').value = p.notes || '';
  document.getElementById('patient-modal').style.display = 'flex';
  setTimeout(() => document.getElementById('modal-initial').focus(), 80);
}

function closePatientModal() {
  document.getElementById('patient-modal').style.display = 'none';
  editingId = null;
}

function savePatient() {
  const name = document.getElementById('modal-initial').value.trim();
  if (!name) { alert('イニシャル / 氏名は必須です'); return; }

  const data = {
    patientId: document.getElementById('modal-id').value.trim(),
    name,
    destination: document.getElementById('modal-dest').value.trim(),
    travelDate: document.getElementById('modal-travel-date').value,
    notes: document.getElementById('modal-notes').value.trim(),
    selectedVaccines: [],
    firstDoseDate: toInputDate(new Date()),
    doneMap: {},
    createdAt: Date.now(),
  };

  if (editingId) {
    const old = patients[editingId];
    data.selectedVaccines = old.selectedVaccines || [];
    data.firstDoseDate = old.firstDoseDate || data.firstDoseDate;
    data.doneMap = old.doneMap || {};
    data.createdAt = old.createdAt;
    patients[editingId] = { id: editingId, ...data };
  } else {
    const id = 'p_' + Date.now();
    patients[id] = { id, ...data };
    currentId = id;
  }

  save();
  closePatientModal();
  renderList();
  renderMain();
}

function openDeleteModal() {
  if (!currentId) return;
  deletingId = currentId;
  document.getElementById('delete-name').textContent = patients[currentId].name;
  document.getElementById('delete-modal').style.display = 'flex';
}

function executeDelete() {
  if (!deletingId) return;
  delete patients[deletingId];
  if (currentId === deletingId) { currentId = null; }
  deletingId = null;
  save();
  document.getElementById('delete-modal').style.display = 'none';
  renderList();
  renderMain();
}

// Sidebar
// =============================================
function renderList() {
  const q = document.getElementById('search-box').value.trim().toLowerCase();
  const list = document.getElementById('patient-list');
  const all = Object.values(patients)
    .filter(p => !q || p.name.toLowerCase().includes(q) || (p.patientId && p.patientId.toLowerCase().includes(q)))
    .sort((a, b) => a.createdAt - b.createdAt);

  if (all.length === 0) {
    list.innerHTML = `<div class="empty-list">${q ? '該当なし' : '患者が登録されていません'}</div>`;
    return;
  }

  list.innerHTML = all.map(p => {
    const sel = p.id === currentId ? ' selected' : '';
    const total = (p.selectedVaccines || []).reduce((sum, vid) => {
      const v = findVaccine(vid);
      return sum + (v ? v.doses.length : 0);
    }, 0);
    const done  = Object.values(p.doneMap || {}).filter(Boolean).length;
    const days = daysUntilTravel(p);
    const daysStr = days !== null
      ? (days < 0 ? `<span style="color:#c0392b">渡航済 ${-days}日前</span>`
        : days === 0 ? '<span style="color:#c0392b">本日渡航</span>'
        : `<span style="color:${days < 14 ? '#e67e22' : '#1a6b3a'}">渡航まで${days}日</span>`)
      : '';
    return `<div class="patient-card${sel}" onclick="selectPatient('${escHtml(p.id)}')">
      <div class="pc-name">${p.patientId ? `[${escHtml(p.patientId)}] ` : ''}${escHtml(p.name)}</div>
      <div class="pc-meta">${p.destination ? escHtml(p.destination) : '渡航先未設定'}</div>
      ${total > 0 ? `<div class="pc-progress">💉 ${done}/${total}回 接種済</div>` : ''}
      ${daysStr ? `<div class="pc-meta" style="margin-top:2px">${daysStr}</div>` : ''}
    </div>`;
  }).join('');
}

function selectPatient(id) {
  currentId = id;
  renderList();
  renderMain();
}

function onFirstDateChange(val) {
  if (!currentId) return;
  patients[currentId].firstDoseDate = val;
  save();
}

function toggleVaccine(vid, el, checked) {
  if (!currentId) return;
  const p = patients[currentId];
  const arr = p.selectedVaccines || [];
  const idx = arr.indexOf(vid);
  if (checked) {
    if (idx < 0) arr.push(vid);
    el.classList.add('selected');
  } else {
    if (idx >= 0) arr.splice(idx, 1);
    el.classList.remove('selected');
  }
  p.selectedVaccines = arr;
  save();
}

function generateSchedule() {
  if (!currentId) return;
  const p = patients[currentId];
  const selectedIds = p.selectedVaccines || [];
  const firstDate = p.firstDoseDate ? new Date(p.firstDoseDate) : new Date();
  firstDate.setHours(0,0,0,0);

  const schedCard = document.getElementById('schedule-card');
  const schedBody = document.getElementById('schedule-body');
  if (!schedCard || !schedBody) return;

  if (selectedIds.length === 0) {
    schedCard.style.display = 'none';
    return;
  }

  // 全ドーズを日付でフラット化
  const rows = [];
  for (const vid of selectedIds) {
    const v = findVaccine(vid);
    if (!v) continue;
    v.doses.forEach(dose => {
      const scheduledDate = addDays(firstDate, dose.dayOffset);
      const key = `${vid}_${dose.num}`;
      rows.push({
        vaccine: v,
        dose,
        scheduledDate,
        key,
        done: !!(p.doneMap || {})[key]
      });
    });
  }

  // 日付でソート
  rows.sort((a, b) => a.scheduledDate - b.scheduledDate);

  // 日付グループ別に表示
  const grouped = {};
  rows.forEach(r => {
    const k = toInputDate(r.scheduledDate);
    if (!grouped[k]) grouped[k] = [];
    grouped[k].push(r);
  });

  const badgeHtml = (v) => {
    const map = { mandatory: 'badge-mandatory', required: 'badge-required', optional: 'badge-optional' };
    return `<span class="badge ${map[v.badge] || 'badge-optional'}">${escHtml(v.badgeLabel)}</span>`;
  };

  const today = new Date(); today.setHours(0,0,0,0);
  const travelDate = p.travelDate ? new Date(p.travelDate) : null;
  if (travelDate) travelDate.setHours(0,0,0,0);

  let html = `<table class="schedule-table">
    <thead><tr>
      <th>接種日</th><th>ワクチン</th><th>回数</th><th>種別</th><th>備考</th><th style="text-align:center">接種済</th>
    </tr></thead>
    <tbody>`;

  let warningShown = false;
  Object.entries(grouped).sort().forEach(([dateStr, dateRows]) => {
    const dt = new Date(dateStr);
    const isPast = dt < today;
    const isToday = dateStr === toInputDate(today);
    const afterTravel = travelDate && dt > travelDate;

    let groupLabel = formatDate(dt);
    if (isToday) groupLabel += ' ⭐ 本日';
    if (afterTravel) groupLabel += ' ⚠️ 渡航後';

    const rowspan = dateRows.length;
    html += `<tr class="date-group-header"><td colspan="6">${groupLabel}${dateRows.length > 1 ? ` （${dateRows.length}種同日接種可能）` : ''}</td></tr>`;

    dateRows.forEach((r, i) => {
      const doneClass = r.done ? ' class="row-done"' : '';
      html += `<tr${doneClass}>
        <td>${formatDate(r.scheduledDate)}</td>
        <td style="font-weight:600">${escHtml(r.vaccine.name)}</td>
        <td>${escHtml(r.dose.label)}</td>
        <td>${badgeHtml(r.vaccine)}</td>
        <td style="font-size:0.78rem;color:#666">${escHtml(r.dose.note)}</td>
        <td style="text-align:center">
          <input type="checkbox" class="done-check" ${r.done ? 'checked' : ''}
            onchange="toggleDone('${escHtml(r.key)}', this.checked)"
            title="接種済みにする">
        </td>
      </tr>`;
    });
  });

  html += '</tbody></table>';

  // 渡航前完了チェック
  if (travelDate) {
    const notDoneBeforeTravel = rows.filter(r => !r.done && r.scheduledDate <= travelDate);
    const afterTravelRows = rows.filter(r => r.scheduledDate > travelDate);
    if (afterTravelRows.length > 0) {
      html = `<div style="background:#fff3cd;padding:10px 20px;font-size:0.84rem;color:#856404;border-bottom:1px solid #ffeaa7">
        ⚠️ <strong>${afterTravelRows.length}回分</strong>のワクチンが渡航予定日（${formatDateJp(p.travelDate)}）以降に設定されています。できるだけ渡航前に完了することをご検討ください。
      </div>` + html;
    }
  }

  schedBody.innerHTML = html;
  schedCard.style.display = '';
}

function toggleDone(key, isDone) {
  if (!currentId) return;
  const p = patients[currentId];
  if (!p.doneMap) p.doneMap = {};
  p.doneMap[key] = isDone;
  save();
  renderList();
  // テーブル行の見た目だけ更新（再描画しない）
  const cb = document.querySelector(`input[onchange*="'${key}'"]`);
  if (cb) {
    const tr = cb.closest('tr');
    if (tr) {
      if (isDone) tr.classList.add('row-done');
      else tr.classList.remove('row-done');
    }
  }
}

// 国名を正規化してルックアップ
function findCountry(destination) {
  const q = destination.trim().toLowerCase()
    .replace(/[ー－]/g, 'ー')   // 長音記号統一
    .replace(/\s+/g, '');
  for (const c of COUNTRY_LOOKUP) {
    if (c.keys.some(k => q.includes(k.toLowerCase().replace(/\s+/g, '')))) return c;
  }
  return null;
}

function buildCdcUrl(destination) {
  const c = findCountry(destination);
  return c
    ? `https://wwwnc.cdc.gov/travel/destinations/traveler/none/${c.cdc}`
    : `https://wwwnc.cdc.gov/travel/destinations/list`;
}

function buildForthUrl(destination) {
  const c = findCountry(destination);
  if (!c || !c.forth) return 'https://www.forth.go.jp/destinations/index.html';
  return `https://www.forth.go.jp/destinations/country/${c.forth}.html`;
}

// CORS プロキシ経由フェッチ
async function fetchViaProxy(url) {
  const workerUrl = `https://vaccine-proxy.dirtydddc.workers.dev/?url=${encodeURIComponent(url)}`;
  try {
    const res = await fetch(workerUrl, { signal: AbortSignal.timeout(12000) });
    if (!res.ok) return null;
    const html = await res.text();
    if (html && html.length > 200) return html;
  } catch(e) { /* 失敗 */ }
  return null;
}

// CDC HTMLからワクチンリストを抽出（名前＋推奨テキスト）
function parseCDC(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const result = { recommended: [], consider: [], routine: [] };

  let currentLevel = 'recommended';
  doc.querySelectorAll('table tr').forEach(tr => {
    const header = tr.querySelector('h3,h4');
    if (header) {
      const t = header.textContent.toLowerCase();
      if (t.includes('routine'))        currentLevel = 'routine';
      else if (t.includes('consider'))  currentLevel = 'consider';
      else if (t.includes('recommend')) currentLevel = 'recommended';
      return;
    }
    const tds = tr.querySelectorAll('td');
    if (tds.length < 1) return;
    const link = tds[0].querySelector('a');
    const rawName = (link ? link.textContent : tds[0].textContent).trim();
    if (!rawName) return;
    const jpName = cdcNameToJp(rawName);
    if (!jpName) return;
    // 推奨テキスト（2列目）
    const note = tds[1] ? tds[1].textContent.replace(/\s+/g, ' ').trim().slice(0, 600) : '';
    const already = result[currentLevel].some(x => x.nameJp === jpName);
    if (!already) result[currentLevel].push({ nameJp: jpName, note });
  });

  // フォールバック：テーブル解析失敗時はキーワード検索
  const total = result.recommended.length + result.consider.length + result.routine.length;
  if (total < 2) {
    const bodyText = doc.body ? doc.body.textContent : '';
    Object.entries(CDC_VAX_JP).forEach(([eng, jp]) => {
      if (bodyText.toLowerCase().includes(eng)) {
        const all = [...result.recommended, ...result.consider, ...result.routine];
        if (!all.some(x => x.nameJp === jp)) {
          result.recommended.push({ nameJp: jp, note: '' });
        }
      }
    });
  }
  return result;
}

function cdcNameToJp(name) {
  const n = name.toLowerCase().trim().replace(/\s*\(.*?\)/g, '').trim();
  if (CDC_VAX_JP[n]) return CDC_VAX_JP[n];
  for (const [key, jp] of Object.entries(CDC_VAX_JP)) {
    if (n.includes(key) || key.includes(n)) return jp;
  }
  const word = n.split(/[\s-]/)[0];
  if (word && CDC_VAX_JP[word]) return CDC_VAX_JP[word];
  if (name.length > 2 && /[A-Za-z]/.test(name)) return name;
  return null;
}

// FORTH HTMLからワクチンリストを抽出（名前＋注記）
function parseFORTH(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const bodyText = doc.body ? doc.body.textContent : html;

  // 脚注マップを先に作成（＊1 → 注記テキスト）
  const footnotes = {};
  const fnMatches = [...bodyText.matchAll(/[＊\*](\d+)[　 ]*([^\n＊\*]{5,100})/g)];
  fnMatches.forEach(m => { footnotes[m[1]] = m[2].trim(); });

  // パターン1: 「予防接種：」以降
  const m1 = bodyText.match(/予防接種[：:・\s]([^\n。]{5,300})/);
  if (m1) {
    return m1[1].split(/[、,，。\n]/).map(s => {
      const fnMatch = s.match(/[＊\*](\d+)/);
      const note = fnMatch && footnotes[fnMatch[1]] ? footnotes[fnMatch[1]] : '';
      const name = s.replace(/[＊\*]\d+/g, '').replace(/[\(\（\)\）]/g, '').trim();
      if (name.length < 2) return null;
      return { name, note };
    }).filter(Boolean);
  }

  // パターン2: ワクチン名キーワード検索
  const m2 = bodyText.match(/受けておきたい予防接種[\s\S]{0,500}/);
  const section = m2 ? m2[0] : bodyText;
  const vaccinePattern = /(A型肝炎|B型肝炎|腸チフス|狂犬病|日本脳炎|黄熱|コレラ|髄膜炎菌|マラリア|デング|チクングニア|破傷風|水痘|麻しん|風しん|おたふく|BCG|結核|ポリオ|インフルエンザ|COVID)/g;
  const names = [];
  [...section.matchAll(vaccinePattern)].forEach(f => {
    if (!names.some(x => x.name === f[0])) names.push({ name: f[0], note: '' });
  });
  return names;
}

// メイン実行
async function lookupVaccines() {
  const p = patients[currentId];
  if (!p || !p.destination) return;

  const btn = document.getElementById('btn-lookup');
  const resultEl = document.getElementById('lookup-result');
  if (!resultEl) return;

  btn.disabled = true;
  btn.textContent = '取得中...';
  resultEl.innerHTML = '<div class="lookup-loading">🌐 情報を取得中です（数秒かかることがあります）...</div>';

  const c = findCountry(p.destination);
  const cdcUrl  = buildCdcUrl(p.destination);
  const forthUrl = buildForthUrl(p.destination);

  // CDCリンクとFORTHリンクを更新
  const cdcLink = document.getElementById('cdc-link');
  const forthLink = document.getElementById('forth-link');
  if (cdcLink)   cdcLink.href  = cdcUrl;
  if (forthLink) forthLink.href = forthUrl;

  let cdcData = null, forthData = null;
  let cdcError = false, forthError = false;

  // 並列フェッチ
  const [cdcHtml, forthHtml] = await Promise.all([
    fetchViaProxy(cdcUrl).catch(() => null),
    c && c.forth ? fetchViaProxy(forthUrl).catch(() => null) : Promise.resolve(null),
  ]);

  if (cdcHtml)   cdcData  = parseCDC(cdcHtml);
  else           cdcError = true;
  if (c && c.forth) {
    if (forthHtml) forthData = parseFORTH(forthHtml);
    else           forthError = true;
  }

  // キャッシュ保存
  const cache = { cdcData, forthData, cdcUrl, forthUrl, cdcError, forthError, hasForth: !!(c && c.forth) };
  patients[currentId].lookupCache = cache;
  save();

  renderLookupHtml(cache, resultEl);
  btn.disabled = false;
  btn.textContent = '🔄 再取得';
}

// ルックアップ結果HTMLを構築してelに挿入（キャッシュ表示でも再利用）
function renderLookupHtml(cache, resultEl) {
  if (!resultEl) return;
  const { cdcData, forthData, cdcUrl, forthUrl, cdcError, forthError, hasForth } = cache;
  const sel = new Set((patients[currentId] || {}).selectedVaccines || []);

  function buildForthMap(forthList) {
    const map = new Map();
    if (!forthList) return map;
    forthList.forEach(fv => {
      const vid = nameToVaccineId(fv.name);
      if (vid) map.set(vid, fv);
    });
    return map;
  }

  function vaxItem(nameJp, cdcNote, levelClass, levelLabel, forthItem) {
    const vid = nameToVaccineId(nameJp);
    const checked = vid && sel.has(vid);
    const noId = !vid ? ' style="opacity:0.6"' : '';
    const title = vid ? '' : ' title="このアプリにワクチン定義がありません"';
    const cdcNoteJp = translateCdcNote(cdcNote);
    const forthBadge = forthItem ? `<span class="forth-badge">🇯🇵 FORTH推奨</span>` : '';
    const forthNoteText = forthItem && forthItem.note ? forthItem.note : '';

    function noteHtml(txt, extraClass, isEng) {
      if (!txt) return '';
      const LIMIT = 120;
      const lang = isEng ? ' lang="en"' : '';
      const short = txt.length > LIMIT ? txt.slice(0, LIMIT - 1) + '…' : txt;
      const needsExpand = txt.length > LIMIT;
      if (!needsExpand) return `<span class="lookup-vax-note${extraClass ? ' ' + extraClass : ''}"${lang}>${escHtml(txt)}</span>`;
      return `<span class="lookup-vax-note${extraClass ? ' ' + extraClass : ''} note-collapsible"${lang}>
        <span class="note-short" hidden>${escHtml(short)}<button class="note-expand-btn" tabindex="-1">もっと見る</button></span>
        <span class="note-full">${escHtml(txt)}<button class="note-expand-btn" tabindex="-1">閉じる</button></span>
      </span>`;
    }

    const forthNoteHtml = forthNoteText ? noteHtml('🇯🇵 ' + forthNoteText, 'forth-note', false) : '';
    const isMalaria = nameJp.includes('マラリア');
    const malariaExtra = isMalaria
      ? `<span class="lookup-vax-note" style="margin-top:3px">マラリア予防薬の詳細は以下を参照：<br><a href="https://medgen.nihinmedia.jp/chat" target="_blank" style="color:#1a56db">https://medgen.nihinmedia.jp/chat</a></span>`
      : '';
    const isColera = nameJp.includes('コレラ');
    const choleraExtra = isColera
      ? `<span class="lookup-vax-note" style="margin-top:3px">輸入ワクチン。<a href="https://www.vaccine4all.jp/news-detail.php?npage=2&amp;nid=133" target="_blank" style="color:#1a56db">ワクチン情報（Vaccine4all）</a></span>`
      : '';
    const isChiku = nameJp.includes('チクングニア');
    const chikuExtra = isChiku
      ? `<span class="lookup-vax-note" style="margin-top:3px">チクングニア流行地域へ旅行する12歳以上の人に推奨。<br>※2026/06/15現在、取り扱いはトラベルクリニック東京のみ？</span>`
      : '';
    const cdcNoteDisplay = cdcNote ? noteHtml(cdcNote, '', true) : '';

    return `<label class="lookup-vax-item ${levelClass}${checked ? ' selected' : ''}"${noId}${title}>
      <input type="checkbox" data-vid="${escHtml(vid||'')}" ${checked ? 'checked' : ''} ${!vid ? 'disabled' : ''}>
      <div class="lookup-vax-info">
        <span class="lookup-vax-name">${escHtml(nameJp)} ${forthBadge}</span>
        ${cdcNoteDisplay}
        ${forthNoteHtml}
        ${malariaExtra}
        ${choleraExtra}
        ${chikuExtra}
      </div>
      <span class="lookup-vax-level">${levelLabel}</span>
    </label>`;
  }

  function sectionHeader(label, color, items) {
    if (!items || items.length === 0) return '';
    const ids = items.map(v => nameToVaccineId(v.nameJp||v.name)).filter(Boolean);
    const addAllBtn = ids.length
      ? `<button class="lookup-add-all" data-addall="${escHtml(JSON.stringify(ids))}">すべて追加</button>`
      : '';
    return `<div class="lookup-level-header" style="color:${color}">▶ ${label} ${addAllBtn}</div>`;
  }

  const forthMap = buildForthMap(forthData);
  const forthVidsSeen = new Set();
  let html = '<div class="lookup-results">';

  const gtCdcUrl = `https://translate.google.com/translate?sl=en&tl=ja&u=${encodeURIComponent(cdcUrl)}`;
  html += `<div class="lookup-source-bar">
    <span>🇺🇸 <a href="${escHtml(cdcUrl)}" target="_blank">CDC Travel</a>
      <a href="${escHtml(gtCdcUrl)}" target="_blank" class="gt-link" title="CDCページをGoogle翻訳で日本語表示">🌐 日本語で読む</a>
    </span>`;
  if (hasForth) {
    html += `<span>🇯🇵 <a href="${escHtml(forthUrl)}" target="_blank">FORTH（厚生労働省）</a></span>`;
  }
  html += `</div>`;

  if (cdcError) {
    html += `<div class="lookup-error">⚠️ CDC情報を取得できませんでした。<a href="${escHtml(cdcUrl)}" target="_blank" style="color:#1a56db">直接確認</a></div>`;
  } else if (!cdcData || (cdcData.recommended.length + cdcData.consider.length + cdcData.routine.length === 0)) {
    html += `<div class="lookup-notfound">CDCを解析できませんでした。<a href="${escHtml(cdcUrl)}" target="_blank" style="color:#1a56db">直接確認</a></div>`;
  } else {
    html += '<div class="lookup-vax-list">';
    if (cdcData.recommended.length > 0) {
      html += sectionHeader('強く推奨', '#856404', cdcData.recommended);
      cdcData.recommended.forEach(v => {
        const vid = nameToVaccineId(v.nameJp);
        const fi = vid && forthMap.has(vid) ? forthMap.get(vid) : null;
        if (fi) forthVidsSeen.add(vid);
        html += vaxItem(v.nameJp, v.note, 'lvl-recommended', '強く推奨', fi);
      });
    }
    if (cdcData.consider.length > 0) {
      html += sectionHeader('状況により推奨', '#c0392b', cdcData.consider);
      cdcData.consider.forEach(v => {
        const vid = nameToVaccineId(v.nameJp);
        const fi = vid && forthMap.has(vid) ? forthMap.get(vid) : null;
        if (fi) forthVidsSeen.add(vid);
        html += vaxItem(v.nameJp, v.note, 'lvl-consider', '条件付き', fi);
      });
    }
    if (cdcData.routine.length > 0) {
      html += sectionHeader('定期（接種歴確認）', '#555', cdcData.routine);
      cdcData.routine.forEach(v => {
        const vid = nameToVaccineId(v.nameJp);
        const fi = vid && forthMap.has(vid) ? forthMap.get(vid) : null;
        if (fi) forthVidsSeen.add(vid);
        html += vaxItem(v.nameJp, v.note, 'lvl-routine', 'ルーチン', fi);
      });
    }
    if (forthData && forthData.length > 0) {
      const forthOnly = forthData.filter(fv => {
        const vid = nameToVaccineId(fv.name);
        return !vid || !forthVidsSeen.has(vid);
      });
      if (forthOnly.length > 0) {
        html += sectionHeader('🇯🇵 FORTHのみ推奨', '#1a6b3a', forthOnly);
        forthOnly.forEach(fv => html += vaxItem(fv.name, '', 'lvl-recommended', 'FORTH推奨', fv));
      }
    }
    html += '</div>';
  }

  if (hasForth && forthError) {
    html += `<div class="lookup-error" style="margin-top:6px">⚠️ FORTH情報を取得できませんでした。<a href="${escHtml(forthUrl)}" target="_blank" style="color:#1a6b3a">直接確認</a></div>`;
  }

  html += '</div>';

  resultEl.innerHTML = html;

  // イベント委譲（毎回新規リスナーを付けないようにフラグ管理）
  if (!resultEl._listenersAttached) {
    resultEl._listenersAttached = true;
    resultEl.addEventListener('change', function(e) {
      const cb = e.target;
      if (cb.type !== 'checkbox' || cb.disabled) return;
      const vid = cb.dataset.vid;
      const labelEl = cb.closest('.lookup-vax-item');
      if (vid) selectVaccineFromLookup(vid, cb.checked, labelEl);
    });
    resultEl.addEventListener('click', function(e) {
      // すべて追加ボタン
      const addAll = e.target.closest('.lookup-add-all');
      if (addAll) { e.stopPropagation(); try { selectAllFromLookup(JSON.parse(addAll.dataset.addall)); } catch(err) {} return; }
      // ノート展開／閉じるボタン
      const expandBtn = e.target.closest('.note-expand-btn');
      if (expandBtn) {
        e.preventDefault(); e.stopPropagation();
        const collapsible = expandBtn.closest('.note-collapsible');
        if (!collapsible) return;
        const shortEl = collapsible.querySelector('.note-short');
        const fullEl  = collapsible.querySelector('.note-full');
        const isExpanded = !fullEl.hidden;
        shortEl.hidden = !isExpanded;
        fullEl.hidden  =  isExpanded;
      }
    });
  }
}

// CDC推奨テキストを文単位で日本語訳
function translateCdcNote(text) {
  if (!text) return '';
  if (/[぀-ヿ一-鿿]/.test(text)) return text;
  const t = text.trim();

  // 文に分割して個別に翻訳
  const sentences = t.match(/[^.!?]+[.!?]*/g) || [t];
  const translated = sentences.map(s => translateCdcSentence(s.trim())).filter(Boolean);
  return translated.join(' ');
}

function translateCdcSentence(s) {
  if (!s || s.length < 3) return '';
  const norm = s.replace(/\s+/g, ' ').trim();

  // ── 予防措置 ──
  if (/all travelers should take steps to prevent mosquito bites/i.test(norm))
    return '全ての渡航者は蚊に刺されないよう対策を取ってください。';
  if (/take steps to prevent mosquito bites/i.test(norm))
    return '蚊に刺されないよう対策を取ってください。';
  if (/take steps to avoid mosquito/i.test(norm))
    return '蚊への接触を避ける対策を取ってください。';
  if (/protect yourself from mosquito/i.test(norm))
    return '蚊から身を守る対策を取ってください。';

  // ── 「generally not recommended」 ──
  if (/vaccination is generally not recommended/i.test(norm))
    return 'ワクチン接種は通常推奨されていません。';
  if (/vaccine is not recommended/i.test(norm))
    return 'このワクチン接種は推奨されていません。';
  if (/not recommended for most travelers/i.test(norm))
    return 'ほとんどの渡航者には不要です。';

  // ── 「Travelers who wish to consider vaccination」 ──
  if (/travelers who wish to consider vaccination/i.test(norm))
    return '接種を検討したい渡航者は、CDCのワクチンページ「渡航前の検討事項」をご確認ください。';

  // ── 「Recommended for most travelers, especially」 ──
  if (/recommended for most travelers.*especially.*friends or relatives.*rural/i.test(norm))
    return 'ほとんどの渡航者に推奨。特に友人・親族宅での滞在や農村部・地方都市訪問者に推奨。';
  if (/recommended for most travelers.*especially.*rural/i.test(norm))
    return 'ほとんどの渡航者に推奨。特に農村部へ行く場合は推奨。';
  if (/recommended for most travelers/i.test(norm))
    return 'ほとんどの渡航者に推奨されます。';
  if (/recommended for all travelers/i.test(norm))
    return '全ての渡航者に推奨されます。';

  // ── 「Recommended for unvaccinated travelers」 ──
  if (/recommended for unvaccinated travelers.*1 year.*older/i.test(norm))
    return '未接種の1歳以上の渡航者に推奨されます。';
  if (/recommended for unvaccinated travelers.*going to/i.test(norm))
    return '渡航先に向かう未接種の渡航者に推奨されます。';
  if (/recommended for unvaccinated travelers/i.test(norm))
    return '未接種の渡航者に推奨されます。';

  // ── 「Recommended for travelers who」 ──
  if (/recommended for travelers who.*moving.*area.*live.*month/i.test(norm))
    return '1か月以上の長期滞在・移住予定の渡航者に推奨されます。';
  if (/recommended for travelers who.*long.*time/i.test(norm))
    return '長期滞在予定の渡航者に推奨されます。';
  if (/recommended for travelers/i.test(norm))
    return '渡航者に推奨されます。';

  // ── 「Consider for」 ──
  if (/consider for some travelers.*outdoor activities.*no air conditioning/i.test(norm))
    return '屋外活動が多い方やエアコンなし・網戸なしの宿泊施設を利用する方は接種を検討してください。';
  if (/consider for some travelers.*outdoor/i.test(norm))
    return '屋外活動が多い渡航者は接種を検討してください。';
  if (/consider for some travelers.*depending on.*activities/i.test(norm))
    return '渡航中の活動内容によっては接種を検討してください。';
  if (/consider for some travelers/i.test(norm))
    return '一部の渡航者は接種を検討してください。';
  if (/consider for travelers/i.test(norm))
    return '渡航者は接種を検討してください。';

  // ── マラリア予防薬 ──
  if (/cdc recommends.*prescription medicine.*malaria/i.test(norm))
    return 'CDCは特定地域への渡航者にマラリア予防薬の服用を推奨しています。';
  if (/cdc recommends.*travelers.*areas.*take.*medicine/i.test(norm))
    return 'CDCは特定地域への渡航者に予防薬の服用を推奨しています。';
  if (/depending on the medicine you take/i.test(norm))
    return '服用する薬の種類によっては、渡航前から飲み始める必要があります。';

  // ── 麻しん ──
  if (/cases of measles are on the rise/i.test(norm))
    return '麻しんは世界的に増加しています。';
  if (/travelers are at risk of measles.*not.*fully vaccinated/i.test(norm))
    return '出発2週間前までに2回接種が完了していない渡航者は感染リスクがあります。';

  // ── 狂犬病 ──
  if (/dogs infected with rabies.*sometimes found/i.test(norm))
    return '狂犬病に感染した犬が存在します。';
  if (/if rabies exposures occur.*vaccines.*available/i.test(norm))
    return '感染リスクにさらされた場合でも、国内各地でワクチン接種が可能です。';
  if (/infected with rabies/i.test(norm))
    return '狂犬病感染リスクがあります。';

  // ── 黄熱 ──
  if (/vaccine is not recommended.*country entry requirements.*not required.*travel from countries with risk/i.test(norm))
    return '通常は不要ですが、黄熱流行国経由での入国時は要求される場合があります。';
  if (/country entry requirements.*vaccine is not required/i.test(norm))
    return '通常の入国では証明書は不要です。';
  if (/travel from countries with risk.*yf/i.test(norm))
    return '黄熱流行国から渡航する場合は接種証明が必要です。';
  if (/country entry requirements/i.test(norm))
    return '入国要件があります（渡航ルートによる）。';

  // ── ルーチンワクチン ──
  if (/make sure.*up-to-date.*routine.*vaccines/i.test(norm))
    return 'ルーチンワクチンの接種が完了していることを確認してください。';
  if (/up-to-date on all routine/i.test(norm))
    return 'ルーチンワクチンの接種状況を確認してください。';

  // ── A型肝炎 詳細 ──
  if (/the dose does not count.*routine.*2.dose series/i.test(norm))
    return 'この接種回は通常の2回シリーズには含まれません。';
  if (/travelers allergic.*vaccine component.*immune globulin/i.test(norm))
    return 'ワクチン成分にアレルギーがある方は免疫グロブリン単回投与で最長2か月間の予防効果が得られます。';
  if (/unvaccinated travelers.*over 40.*immunocompromised.*2 weeks/i.test(norm))
    return '40歳以上・免疫不全・慢性疾患がある未接種者で2週間以内に渡航予定の場合は、初回接種と免疫グロブリンの同時投与を検討してください。';
  if (/unvaccinated travelers.*40.*chronic medical/i.test(norm))
    return '40歳以上・慢性疾患のある未接種渡航者は特に要注意です。';
  if (/immune globulin.*provides effective protection/i.test(norm))
    return '免疫グロブリンは投与量に応じて最長2か月間の有効な感染予防効果があります。';

  // ── マラリア詳細 ──
  if (/talk to your doctor.*malaria medication/i.test(norm))
    return '服用するマラリア予防薬については医師にご相談ください。';
  if (/zoonotic transmission.*p\. knowlesi.*rural.*forested/i.test(norm))
    return 'サルマラリア（P. knowlesi）が農村・森林地帯で人への感染リスクがあります。';
  if (/no malaria transmission.*kuala lumpur/i.test(norm))
    return 'クアラルンプール（首都）・ペナン島などの都市部ではマラリアのリスクはありません。';
  if (/no malaria transmission in other areas/i.test(norm))
    return '他の地域ではマラリアの感染リスクはありません。';
  if (/transmission areas/i.test(norm) && norm.length < 30)
    return '感染リスク地域が存在します。';
  if (/drug resistance/i.test(norm) && norm.length < 30)
    return '薬剤耐性あり。';

  // ── 狂犬病 詳細 ──
  if (/rabies pre-exposure vaccination.*considerations/i.test(norm))
    return '暴露前ワクチン接種の検討基準：職業・レクリエーション活動での動物接触リスクがある場合、医療へのアクセスが限られる地域への渡航、長期滞在（1か月以上）など。';
  if (/rabies.*exposure.*occur.*vaccines.*available/i.test(norm))
    return '暴露後も現地でワクチン接種が可能ですが、事前接種で治療が大幅に簡略化されます。';
  if (/rabies vaccines.*typically available/i.test(norm))
    return '現地でもワクチン接種は可能ですが、アクセスに注意が必要です。';

  // ── 乳児・高齢者追加接種 ──
  if (/infants.*6 to 11 months.*hepatitis a/i.test(norm))
    return '生後6〜11か月の乳児も接種推奨（通常回数には含まれません）。';
  if (/infants.*months.*vaccinated/i.test(norm))
    return '乳児も接種が推奨されます（通常回数には含まれません）。';
  if (/travelers 60 years and older.*vaccinated.*before traveling/i.test(norm))
    return '60歳以上の未接種渡航者も渡航前の接種が推奨されます。';
  if (/60 years and older.*vaccinated/i.test(norm))
    return '60歳以上の未接種者も接種が推奨されます。';

  // ── COVID-19 ──
  if (/please see your covid-19 vaccination/i.test(norm))
    return '詳細はCDCのCOVID-19ワクチンページをご確認ください。';
  if (/covid-19 vaccination.*page/i.test(norm))
    return 'CDCのCOVID-19ワクチンページをご参照ください。';

  // ── レプトスピラ ──
  if (/touching urine or other body fluids.*leptospirosis/i.test(norm))
    return '感染動物の尿・体液への接触、汚染された淡水や泥との接触・飲用で感染します。';
  if (/urine-contaminated.*fresh water/i.test(norm))
    return '尿で汚染された淡水での水泳や土との接触でも感染します。';

  // ── ジカ熱 ──
  if (/mosquito bite.*infected pregnant woman.*spread/i.test(norm))
    return '主に蚊から感染。感染した妊婦から胎児への感染もあります。';
  if (/infected pregnant woman.*spread.*baby/i.test(norm))
    return '感染した妊婦から赤ちゃんへの感染もあります。';

  // ── ハンタウイルス・TB ──
  if (/breathing in.*tb bacteria.*air.*infected/i.test(norm))
    return '感染者の空気（飛沫核）を吸い込むことで感染します。';
  if (/breathing in air.*accidentally eating food.*contaminated/i.test(norm))
    return '空気感染または汚染食物の摂取で感染します。';
  if (/breathe in.*bacteria.*air/i.test(norm))
    return '空気感染（飛沫核）で感染します。';

  // ── デング熱・Mosquito bite ──
  if (/^mosquito bite$/i.test(norm))
    return '蚊から感染します。';
  if (/mosquito bite/i.test(norm) && norm.length < 30)
    return '蚊から感染します。';

  // ── 感染経路 ──
  if (/spread.*contaminated food.*water/i.test(norm))
    return '汚染された食物や水から感染します。';
  if (/spread.*food.*water/i.test(norm))
    return '食物・水から感染します。';
  if (/spread.*mosquito/i.test(norm))
    return '蚊から感染します。';
  if (/spread.*tick/i.test(norm))
    return 'マダニから感染します。';
  if (/transmitted.*mosquito/i.test(norm))
    return '蚊によって感染します。';

  // ── 長期滞在・農村部 ──
  if (/long.?term travelers.*rural/i.test(norm))
    return '農村部への長期渡航者に推奨されます。';
  if (/long.?term travelers/i.test(norm))
    return '長期渡航者に推奨されます。';
  if (/extended stay/i.test(norm))
    return '長期滞在者は接種を検討してください。';

  // ── 一般的な推奨文 ──
  if (/travelers should.*check.*vaccin/i.test(norm))
    return '渡航前に接種状況を確認してください。';
  if (/travelers should/i.test(norm))
    return '渡航者は確認・注意が必要です。';

  // 短いフレーズはそのまま、長い英文は省略
  if (norm.length <= 50) return norm;
  return '（詳細はCDCサイトをご確認ください）';
}

// セクションのアコーディオン開閉
function toggleSection(id) {
  const body = document.getElementById('section-body-' + id);
  const toggle = document.getElementById('section-toggle-' + id);
  if (!body) return;
  const collapsed = body.classList.toggle('collapsed');
  if (toggle) toggle.classList.toggle('collapsed', collapsed);
}

// ルックアップ結果からワクチンを個別選択
function selectVaccineFromLookup(vid, checked, labelEl) {
  if (!vid || !currentId) return;
  const p = patients[currentId];
  const arr = p.selectedVaccines || [];
  const idx = arr.indexOf(vid);
  if (checked) {
    if (idx < 0) arr.push(vid);
    labelEl.classList.add('selected');
  } else {
    if (idx >= 0) arr.splice(idx, 1);
    labelEl.classList.remove('selected');
  }
  p.selectedVaccines = arr;
  save();
  // ワクチン選択グリッドの対応チェックボックスも同期
  const gridCb = document.querySelector(`.vax-item input[onchange*="'${vid}'"]`);
  if (gridCb) {
    gridCb.checked = checked;
    gridCb.closest('.vax-item').classList.toggle('selected', checked);
  }
}

// 一括追加
function selectAllFromLookup(vids) {
  if (!currentId) return;
  const p = patients[currentId];
  const arr = p.selectedVaccines || [];
  vids.forEach(vid => { if (!arr.includes(vid)) arr.push(vid); });
  p.selectedVaccines = arr;
  save();
  // UIを再描画して同期
  const resultEl = document.getElementById('lookup-result');
  if (resultEl) {
    resultEl.querySelectorAll('.lookup-vax-item').forEach(label => {
      const cb = label.querySelector('input[type="checkbox"]');
      if (cb && !cb.disabled) { cb.checked = true; label.classList.add('selected'); }
    });
  }
  // ワクチン選択グリッドも同期
  vids.forEach(vid => {
    const gridCb = document.querySelector(`.vax-item input[onchange*="'${vid}'"]`);
    if (gridCb) { gridCb.checked = true; gridCb.closest('.vax-item').classList.add('selected'); }
  });
}

renderList();
renderMain();
