<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>タイマー / ストップウォッチ</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 16px;
    }

    /* ═══════════════════════════════════════
       2カラム レイアウト
       PC : 横並び  /  モバイル : 縦積み
    ════════════════════════════════════════ */
    .layout {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
      max-width: 860px;
    }

    @media (min-width: 720px) {
      .layout {
        flex-direction: row;
        align-items: center;
        justify-content: center;
        gap: 40px;
      }
    }

    .panel-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      flex: 0 0 auto;
    }

    .panel-right {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1 1 300px;
      max-width: 360px;
      width: 100%;
    }

    /* ── モード切り替えタブ ── */
    .mode-tabs {
      display: flex;
      background: #0d1b33;
      border: 1px solid #1e2e4a;
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
    }

    .mode-tab {
      border: none;
      background: transparent;
      color: #5a7aaa;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 9px 24px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
      min-height: 42px;
    }

    .mode-tab.active {
      background: #1e3a6e;
      color: #b0c8ff;
    }

    /* ── タイマー数字 ── */
    .timer-display {
      font-size: clamp(4.5rem, 18vw, 8rem);
      font-weight: 200;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
      color: #e0e8ff;
      text-shadow: 0 0 40px rgba(100, 160, 255, 0.4);
      transition: color 0.3s, transform 0.1s;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      line-height: 1;
    }

    .timer-display:active { transform: scale(0.96); }

    .timer-display.running {
      color: #7fff9a;
      text-shadow: 0 0 40px rgba(100, 255, 150, 0.4);
    }

    .timer-display.finished {
      color: #ff7f7f;
      text-shadow: 0 0 40px rgba(255, 100, 100, 0.5);
      animation: blink 0.8s ease-in-out infinite alternate;
    }

    @keyframes blink {
      from { opacity: 1; }
      to   { opacity: 0.5; }
    }

    /* ── ストップウォッチ ミリ秒 ── */
    .ms-display {
      font-size: clamp(1.6rem, 6vw, 2.8rem);
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      color: #6a7a9a;
      transition: color 0.3s;
      margin-top: -6px;
      user-select: none;
    }

    .ms-display.running { color: #4dbf72; }

    /* ── コントロールボタン ── */
    .controls {
      display: flex;
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      padding: 13px 28px;
      min-width: 120px;
      min-height: 50px;
      cursor: pointer;
      transition: filter 0.15s, transform 0.1s;
      user-select: none;
      -webkit-user-select: none;
    }

    .btn:active { transform: scale(0.95); filter: brightness(0.85); }

    .btn-start            { background: #2a6aff; color: #fff; }
    .btn-start.is-running { background: #1a8a4a; }
    .btn-reset            { background: #1e2e4a; color: #7a9acf; border: 1px solid #2a3a5a; }

    /* ── 入力欄（タイマーのみ） ── */
    .timer-only.hidden { display: none; }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .input-group label {
      font-size: 0.72rem;
      color: #7888a8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .input-group input {
      width: 76px;
      padding: 7px 10px;
      font-size: 1.5rem;
      text-align: center;
      background: #0d1b33;
      border: 1px solid #2a3a5a;
      border-radius: 8px;
      color: #e0e8ff;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus { border-color: #4a7aff; }

    .input-sep { font-size: 1.8rem; color: #4a5a7a; padding-top: 14px; }

    /* ── プリセット ── */
    .presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset-btn {
      background: #0d1b33;
      border: 1px solid #2a3a5a;
      border-radius: 8px;
      color: #7a9acf;
      font-size: 0.9rem;
      padding: 8px 16px;
      min-height: 40px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }

    .preset-btn:active { transform: scale(0.95); }
    .preset-btn.active { border-color: #4a7aff; color: #4a7aff; }

    /* ── 積算時間 ── */
    .accum-box {
      background: #0d1b33;
      border: 1px solid #1e2e4a;
      border-radius: 12px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .accum-label {
      font-size: 0.72rem;
      color: #5a7aaa;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .accum-time {
      font-size: 1.8rem;
      font-weight: 200;
      font-variant-numeric: tabular-nums;
      color: #a0b4d8;
      letter-spacing: 0.04em;
      flex: 1;
    }

    .accum-time.running { color: #7fff9a; }

    .btn-accum-reset {
      border: 1px solid #2a3a5a;
      background: transparent;
      color: #4a6a9a;
      font-size: 0.8rem;
      padding: 6px 12px;
      border-radius: 7px;
      cursor: pointer;
      white-space: nowrap;
      min-height: 34px;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-accum-reset:hover  { color: #7a9acf; border-color: #4a6aaa; }
    .btn-accum-reset:active { transform: scale(0.95); }

    /* ── ステータス ── */
    .status {
      font-size: 0.88rem;
      color: #5a6a8a;
      min-height: 1.2em;
      text-align: center;
    }

    /* ── 説明書き ── */
    .instructions {
      background: #0d1b33;
      border: 1px solid #1e2e4a;
      border-radius: 12px;
      padding: 16px 20px;
    }

    .instructions h2 {
      font-size: 0.72rem;
      color: #5a7aaa;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }

    .instructions ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .instructions li {
      font-size: 0.83rem;
      color: #8898b8;
      display: flex;
      gap: 10px;
      align-items: baseline;
    }

    .key {
      display: inline-block;
      background: #1a2a4a;
      border: 1px solid #2e4a70;
      border-radius: 5px;
      padding: 1px 7px;
      font-size: 0.75rem;
      font-family: monospace;
      color: #aac0e0;
      white-space: nowrap;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
<div class="layout">

  <!-- 左パネル：タイマー操作 -->
  <div class="panel-left">

    <div class="mode-tabs">
      <button class="mode-tab active" id="tabTimer">タイマー</button>
      <button class="mode-tab"        id="tabSW">ストップウォッチ</button>
    </div>

    <div class="timer-display" id="display">00:00</div>
    <div class="ms-display hidden" id="msDisplay">.00</div>

    <div class="controls">
      <button class="btn btn-start" id="btnStart">▶ スタート</button>
      <button class="btn btn-reset" id="btnReset">↺ リセット</button>
    </div>

    <div class="timer-only" id="timerOnly">
      <div class="input-row">
        <div class="input-group">
          <label>分</label>
          <input type="number" id="inputMin" min="0" max="99" value="0">
        </div>
        <span class="input-sep">:</span>
        <div class="input-group">
          <label>秒</label>
          <input type="number" id="inputSec" min="0" max="59" value="10">
        </div>
      </div>
    </div>

    <div class="timer-only presets" id="presetsRow">
      <button class="preset-btn" data-sec="15">15秒</button>
      <button class="preset-btn" data-sec="30">30秒</button>
      <button class="preset-btn" data-sec="40">40秒</button>
      <button class="preset-btn" data-sec="60">1分</button>
      <button class="preset-btn" data-sec="1800">30分</button>
    </div>

  </div><!-- /panel-left -->

  <!-- 右パネル：積算・ステータス・説明 -->
  <div class="panel-right">

    <div class="accum-box">
      <span class="accum-label">積算時間</span>
      <span class="accum-time" id="accumDisplay">0:00:00</span>
      <button class="btn-accum-reset" id="btnAccumReset">クリア</button>
    </div>

    <div class="status" id="status">タップまたはスペースキーでスタート</div>

    <div class="instructions">
      <h2>操作方法</h2>
      <ul id="instrList"></ul>
    </div>

  </div><!-- /panel-right -->

</div><!-- /layout -->

  <script>
    /* ===== 状態 ===================================================== */
    let mode      = 'timer';
    let running   = false;
    let interval  = null;

    let remaining    = 10;
    let total        = 10;
    let timerDeadline = 0;

    let swMs        = 0;
    let swStartTime = 0;

    let accumMs       = 0;
    let accumRunStart = 0;

    /* ===== Audio ==================================================== */
    let audioCtx = null;
    function getAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      return audioCtx;
    }
    function resumeAudio() { getAudio().resume(); }
    function playFinishSound() {
      const ctx = getAudio();
      ctx.resume().then(() => {
        [0, 0.35, 0.7].forEach(offset => {
          const osc = ctx.createOscillator(), gain = ctx.createGain();
          osc.connect(gain); gain.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.setValueAtTime(880, ctx.currentTime + offset);
          gain.gain.setValueAtTime(0.5, ctx.currentTime + offset);
          gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + offset + 0.25);
          osc.start(ctx.currentTime + offset);
          osc.stop(ctx.currentTime + offset + 0.25);
        });
      });
    }

    /* ===== DOM refs ================================================= */
    const display       = document.getElementById('display');
    const msDisplay     = document.getElementById('msDisplay');
    const statusEl      = document.getElementById('status');
    const btnStart      = document.getElementById('btnStart');
    const btnReset      = document.getElementById('btnReset');
    const inputMin      = document.getElementById('inputMin');
    const inputSec      = document.getElementById('inputSec');
    const timerOnly     = document.getElementById('timerOnly');
    const presetsRow    = document.getElementById('presetsRow');
    const presetBtns    = document.querySelectorAll('.preset-btn');
    const tabTimer      = document.getElementById('tabTimer');
    const tabSW         = document.getElementById('tabSW');
    const instrList     = document.getElementById('instrList');
    const accumDisplay  = document.getElementById('accumDisplay');
    const btnAccumReset = document.getElementById('btnAccumReset');

    /* ===== フォーマット ============================================= */
    function formatSec(s) {
      const m = Math.floor(s / 60).toString().padStart(2, '0');
      return `${m}:${(s % 60).toString().padStart(2, '0')}`;
    }
    function formatMs(ms) {
      const ts = Math.floor(ms / 1000);
      const m  = Math.floor(ts / 60).toString().padStart(2, '0');
      const s  = (ts % 60).toString().padStart(2, '0');
      const cs = Math.floor((ms % 1000) / 10).toString().padStart(2, '0');
      return { main: `${m}:${s}`, sub: `.${cs}` };
    }
    function formatAccum(ms) {
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60).toString().padStart(2, '0');
      const ss = (s % 60).toString().padStart(2, '0');
      return `${h}:${m}:${ss}`;
    }

    /* ===== 表示更新 ================================================= */
    function updateDisplay() {
      if (mode === 'timer') {
        display.textContent = formatSec(remaining);
      } else {
        const f = formatMs(swMs);
        display.textContent = f.main;
        msDisplay.textContent = f.sub;
      }
    }
    function updateAccumDisplay() {
      const live = accumMs + (running ? Date.now() - accumRunStart : 0);
      accumDisplay.textContent = formatAccum(live);
      accumDisplay.classList.toggle('running', running);
    }
    function updateStartBtn() {
      btnStart.textContent = running ? '⏸ ストップ' : '▶ スタート';
      btnStart.classList.toggle('is-running', running);
    }
    function setStatus(text) { statusEl.textContent = text; }
    function setActivePreset(sec) {
      presetBtns.forEach(b => b.classList.toggle('active', parseInt(b.dataset.sec) === sec));
    }

    /* ===== 説明書き ================================================= */
    const INSTR = {
      timer: [
        ['タップ / Space', 'スタート・ストップ（数字部分も可）'],
        ['↺ / Enter',      '指定時間にリセットして再スタート'],
        ['プリセット',     'よく使う時間を即スタート'],
        ['分 / 秒',        '入力欄で時間を設定'],
        ['積算クリア',     '積算時間のみ 0 に戻す'],
      ],
      stopwatch: [
        ['タップ / Space', 'スタート・ストップ（数字部分も可）'],
        ['↺ / Enter',      '00:00 にリセット'],
        ['積算クリア',     '積算時間のみ 0 に戻す'],
      ],
    };
    function updateInstructions() {
      instrList.innerHTML = INSTR[mode]
        .map(([k, v]) => `<li><span class="key">${k}</span>${v}</li>`)
        .join('');
    }

    /* ===== タイマー ================================================= */
    function timerStart() {
      if (remaining <= 0) return;
      running = true;
      accumRunStart = Date.now();
      timerDeadline = Date.now() + remaining * 1000;
      display.classList.add('running');
      display.classList.remove('finished');
      setStatus('実行中… タップで一時停止');
      updateStartBtn();
      interval = setInterval(() => {
        remaining = Math.max(0, Math.ceil((timerDeadline - Date.now()) / 1000));
        updateDisplay();
        updateAccumDisplay();
        if (remaining <= 0) timerFinish();
      }, 200);
    }
    function timerStop() {
      accumMs += Date.now() - accumRunStart;
      running = false;
      clearInterval(interval); interval = null;
      display.classList.remove('running');
      setStatus('一時停止中 — タップで再開 / ↺ でリセット');
      updateStartBtn();
      updateAccumDisplay();
    }
    function timerFinish() {
      timerStop();
      display.classList.add('finished');
      setStatus('時間になりました！ ↺ でリセット');
      playFinishSound();
    }
    function timerReset() {
      if (running) accumMs += Date.now() - accumRunStart;
      clearInterval(interval); interval = null; running = false;
      display.classList.remove('running', 'finished');
      total = (parseInt(inputMin.value) || 0) * 60 + (parseInt(inputSec.value) || 0);
      remaining = total;
      if (total <= 0) { updateDisplay(); updateStartBtn(); setStatus('時間を設定してください'); return; }
      saveLastSec(total);
      updateDisplay();
      timerStart();
    }

    /* ===== ストップウォッチ ========================================= */
    function swStart() {
      running = true;
      accumRunStart = Date.now();
      swStartTime = Date.now() - swMs;
      display.classList.add('running');
      msDisplay.classList.add('running');
      setStatus('計測中… タップで一時停止');
      updateStartBtn();
      interval = setInterval(() => {
        swMs = Date.now() - swStartTime;
        updateDisplay();
        updateAccumDisplay();
      }, 30);
    }
    function swStop() {
      accumMs += Date.now() - accumRunStart;
      running = false;
      clearInterval(interval); interval = null;
      display.classList.remove('running');
      msDisplay.classList.remove('running');
      setStatus('一時停止中 — タップで再開 / ↺ でリセット');
      updateStartBtn();
      updateAccumDisplay();
    }
    function swReset() {
      if (running) accumMs += Date.now() - accumRunStart;
      clearInterval(interval); interval = null; running = false;
      swMs = 0;
      display.classList.remove('running');
      msDisplay.classList.remove('running');
      updateDisplay();
      updateStartBtn();
      setStatus('タップまたはスペースキーでスタート');
    }

    /* ===== 共通 ===================================================== */
    function toggleStartStop() {
      resumeAudio();
      if (mode === 'timer') {
        running ? timerStop() : (remaining > 0 ? timerStart() : setStatus('↺ でリセットしてください'));
      } else {
        running ? swStop() : swStart();
      }
    }
    function doReset() {
      resumeAudio();
      mode === 'timer' ? timerReset() : swReset();
    }

    /* ===== モード切り替え =========================================== */
    function switchMode(newMode) {
      if (newMode === mode) return;
      clearInterval(interval); interval = null; running = false;
      mode = newMode;
      const isTimer = mode === 'timer';
      tabTimer.classList.toggle('active', isTimer);
      tabSW.classList.toggle('active', !isTimer);
      timerOnly.classList.toggle('hidden', !isTimer);
      presetsRow.classList.toggle('hidden', !isTimer);
      msDisplay.classList.toggle('hidden', isTimer);
      display.classList.remove('running', 'finished');
      msDisplay.classList.remove('running');
      if (isTimer) {
        remaining = (parseInt(inputMin.value) || 0) * 60 + (parseInt(inputSec.value) || 0);
        if (!remaining) remaining = total;
      } else {
        swMs = 0;
      }
      updateDisplay();
      updateStartBtn();
      updateAccumDisplay();
      updateInstructions();
      setStatus('タップまたはスペースキーでスタート');
    }

    /* ===== スリープ復帰 ============================================= */
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState !== 'visible' || !running) return;
      if (mode === 'timer') {
        remaining = Math.max(0, Math.ceil((timerDeadline - Date.now()) / 1000));
        updateDisplay();
        if (remaining <= 0) timerFinish();
      } else {
        swMs = Date.now() - swStartTime;
        updateDisplay();
      }
      updateAccumDisplay();
    });

    /* ===== イベント ================================================= */
    tabTimer.addEventListener('click', () => switchMode('timer'));
    tabSW.addEventListener('click',    () => switchMode('stopwatch'));
    btnStart.addEventListener('click', toggleStartStop);
    btnReset.addEventListener('click', doReset);
    // タッチデバイス（iPad等）はタップでリセット、マウス操作はスタート/ストップ
    const isTouch = navigator.maxTouchPoints > 0;
    display.addEventListener('click', isTouch ? doReset : toggleStartStop);
    btnAccumReset.addEventListener('click', () => {
      accumMs = 0;
      accumRunStart = running ? Date.now() : 0;
      updateAccumDisplay();
    });

    document.addEventListener('keydown', e => {
      if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName) &&
          e.key !== ' ' && e.key !== 'Enter') return;
      if (e.key === ' ') { e.preventDefault(); toggleStartStop(); }
      if (e.key === 'Enter') { e.preventDefault(); doReset(); }
    });

    inputMin.addEventListener('change', () => {
      if (!running) { remaining = (parseInt(inputMin.value)||0)*60 + (parseInt(inputSec.value)||0); updateDisplay(); setActivePreset(-1); }
    });
    inputSec.addEventListener('change', () => {
      if (!running) { remaining = (parseInt(inputMin.value)||0)*60 + (parseInt(inputSec.value)||0); updateDisplay(); setActivePreset(-1); }
    });

    presetBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        resumeAudio();
        const sec = parseInt(btn.dataset.sec);
        inputMin.value = Math.floor(sec / 60);
        inputSec.value = sec % 60;
        if (running) accumMs += Date.now() - accumRunStart;
        clearInterval(interval); interval = null; running = false;
        display.classList.remove('running', 'finished');
        total = sec; remaining = sec;
        saveLastSec(sec);
        updateDisplay(); setActivePreset(sec);
        timerStart();
      });
    });

    /* ===== localStorage で最終使用秒数を保存・復元 ================= */
    function saveLastSec(sec) {
      try { localStorage.setItem('timer_last_sec', sec); } catch (_) {}
    }
    function loadLastSec() {
      try { return parseInt(localStorage.getItem('timer_last_sec')) || 10; } catch (_) { return 10; }
    }

    /* ===== 初期化 =================================================== */
    const initSec = loadLastSec();
    total = initSec;
    remaining = initSec;
    inputMin.value = Math.floor(initSec / 60);
    inputSec.value = initSec % 60;

    updateDisplay();
    updateStartBtn();
    updateAccumDisplay();
    updateInstructions();
  </script>
</body>
</html>
